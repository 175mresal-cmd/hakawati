<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلة قطرة المطر الصغيرة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marhey:wght@400;700&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="book" id="book">
    <div class="stage-wrap" id="stageWrap">
      <div id="stage"></div>
      <div class="hint" id="hint"></div>
      <div class="narrator-bar" id="narratorBar">
        <button class="narr-btn" id="narrToggleBtn" title="تشغيل/إيقاف صوت الراوي">🔊</button>
        <button class="narr-btn" id="narrReplayBtn" title="إعادة الاستماع">🔁</button>
      </div>
    </div>
    <div class="textbox">
      <p class="page-title" id="pageTitle"></p>
      <p class="page-text" id="pageText"></p>
    </div>
    <div id="quizArea"></div>
    <div class="controls">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="counter" id="counter"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
